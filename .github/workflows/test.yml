name: Test

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
      - run: composer install
      - run: vendor/bin/phpunit --testsuite=Unit
